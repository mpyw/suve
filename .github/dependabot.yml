version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      wailsapp:
        patterns: ["github.com/wailsapp/*"]
        update-types: ["minor", "patch"]
      go-minor:
        patterns: ["*"]
        exclude-patterns: ["github.com/wailsapp/*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: npm
    directory: /internal/gui/frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      npm-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-minor:
        patterns: ["*"]
        update-types: ["minor", "patch"]
