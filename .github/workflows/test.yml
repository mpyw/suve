name: Test

on:
  push:
    branches: [main]
  # Run on PRs against ANY base branch, not just main, so stacked PRs (whose
  # base is another feature branch) still get the full test workflow instead of
  # zero CI.
  pull_request:
    branches: ['**']

permissions:
  contents: read

# Deterministic staging data key for the whole test workflow, mirroring what
# `mise test` sets locally. The staging working store is encrypted with this
# instead of falling back to plaintext on the keychain-less CI runners — a
# fallback that non-interactive writes now refuse without consent. Not a secret:
# a fixed base64 of 32 zero bytes.
env:
  SUVE_STAGING_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: go build -v ./...

      - name: Run tests with coverage
        run: |
          PACKAGES=$(go list ./... | grep -v internal/gui | grep -v /cmd/)
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -coverprofile=coverage.txt -covermode=atomic -coverpkg=$COVERPKG $PACKAGES

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-suve-unit
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  gui-go-test:
    name: GUI Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails dependencies (CGO)
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep $((i * 5)); done
          for i in {1..5}; do sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config && break || sleep $((i * 5)); done

      - name: Create dummy frontend dist
        run: mkdir -p internal/gui/frontend/dist && touch internal/gui/frontend/dist/index.html

      - name: Run GUI Go tests with coverage
        run: |
          CGO_ENABLED=1 go test -v -race -tags=production,webkit2_41 \
            -coverprofile=coverage-gui.txt -covermode=atomic \
            -coverpkg=./internal/gui/... ./internal/gui/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-gui.txt
          flags: gui
          name: codecov-suve-gui
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-aws:
    name: E2E Test (AWS)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:4
        ports:
          - 4566:4566
        env:
          SERVICES: ssm,secretsmanager,events
          DEBUG: 0
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for localstack
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:4566/_localstack/health; do sleep 2; done'

      - name: Run e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestAWS' -coverprofile=coverage-e2e.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e.txt
          flags: e2e
          name: codecov-suve-e2e-aws
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-aws-tui:
    # TUI e2e: drives the real TUI App (teatest) against localstack, exercising
    # the browse → stage → apply loop over the real data path. Separate from
    # e2e-aws (which filters `^TestAWS`) because the TUI tests use the
    # `^TestTUIAWS` prefix; this job runs exactly those and uploads coverage.
    name: E2E Test (AWS TUI)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:4
        ports:
          - 4566:4566
        env:
          SERVICES: ssm,secretsmanager,events
          DEBUG: 0
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for localstack
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:4566/_localstack/health; do sleep 2; done'

      - name: Run TUI e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestTUIAWS' -coverprofile=coverage-e2e-tui.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e-tui.txt
          flags: e2e
          name: codecov-suve-e2e-aws-tui
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-gcloud:
    name: E2E Test (Google Cloud)
    runs-on: ubuntu-latest
    services:
      # Google Cloud Secret Manager emulator (gRPC :9090), no auth, offline.
      gcloud-secretmanager:
        image: ghcr.io/blackwell-systems/gcp-secret-manager-emulator-dual:latest
        ports:
          - 9090:9090
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the Secret Manager emulator
        run: timeout 60 bash -c 'until (echo > /dev/tcp/localhost/9090) 2>/dev/null; do sleep 1; done'

      - name: Run Google Cloud e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestGoogleCloud' -coverprofile=coverage-e2e-gcloud.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...
        env:
          SUVE_GCLOUD_SECRETMANAGER_ENDPOINT: localhost:9090

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e-gcloud.txt
          flags: e2e
          name: codecov-suve-e2e-gcloud
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-gcloud-tui:
    # TUI e2e: drives the real TUI App (teatest) against the Google Cloud Secret
    # Manager emulator, exercising the browse → stage → apply loop over the real
    # data path. Separate from e2e-gcloud (which filters `^TestGoogleCloud`)
    # because the TUI tests use the `^TestTUIGoogleCloud` prefix; running them on a
    # dedicated, FRESH emulator keeps them isolated from the CLI gcloud tests,
    # whose created-then-deleted secrets would otherwise pollute the TUI browser's
    # list on a shared emulator.
    name: E2E Test (Google Cloud TUI)
    runs-on: ubuntu-latest
    services:
      # Google Cloud Secret Manager emulator (gRPC :9090), no auth, offline.
      gcloud-secretmanager:
        image: ghcr.io/blackwell-systems/gcp-secret-manager-emulator-dual:latest
        ports:
          - 9090:9090
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the Secret Manager emulator
        run: timeout 60 bash -c 'until (echo > /dev/tcp/localhost/9090) 2>/dev/null; do sleep 1; done'

      - name: Run Google Cloud TUI e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestTUIGoogleCloud' -coverprofile=coverage-e2e-gcloud-tui.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...
        env:
          SUVE_GCLOUD_SECRETMANAGER_ENDPOINT: localhost:9090

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e-gcloud-tui.txt
          flags: e2e
          name: codecov-suve-e2e-gcloud-tui
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-azure:
    name: E2E Test (Azure)
    runs-on: ubuntu-latest
    services:
      # Azure App Configuration emulator (HTTP :8080, HMAC over plain HTTP),
      # offline. A fork of tnc1997/azure-app-configuration-emulator patched to
      # interoperate with the official Azure SDKs.
      # https://github.com/mpyw/azure-app-configuration-emulator
      azure-appconfig:
        image: ghcr.io/mpyw/azure-app-configuration-emulator:latest
        ports:
          - 8080:8080
        env:
          ASPNETCORE_HTTP_PORTS: 8080
      # Azure Key Vault emulator (lowkey-vault, HTTPS :8443, self-signed cert,
      # auth present-but-ignored), offline.
      azure-keyvault:
        image: nagyesta/lowkey-vault:7.3.0
        ports:
          - 8443:8443
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the App Configuration emulator
        run: timeout 60 bash -c 'until (echo > /dev/tcp/localhost/8080) 2>/dev/null; do sleep 1; done'

      - name: Wait for the Key Vault emulator
        run: timeout 60 bash -c 'until curl -sk -o /dev/null https://localhost:8443/ping; do sleep 1; done'

      - name: Run Azure e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestAzure(AppConfig|KeyVault)' -coverprofile=coverage-e2e-azure.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...
        env:
          SUVE_AZURE_APPCONFIG_CONNECTION_STRING: "Endpoint=http://localhost:8080;Id=abcd;Secret=c2VjcmV0"
          SUVE_AZURE_KEYVAULT_ENDPOINT: "https://localhost:8443"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e-azure.txt
          flags: e2e
          name: codecov-suve-e2e-azure
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  e2e-azure-tui:
    # TUI e2e: drives the real TUI App (teatest) against BOTH Azure emulators,
    # exercising the browse → stage → apply loop over the real data path.
    # Separate from e2e-azure (which filters `^TestAzure(AppConfig|KeyVault)`)
    # because the TUI tests use the `^TestTUIAzure` prefix and MUST run against a
    # fresh emulator pair: sharing one pair with the CLI Azure suite lets its
    # leftover settings contaminate the namespace-partitioning assertions here.
    # This job runs exactly those tests and uploads coverage.
    name: E2E Test (Azure TUI)
    runs-on: ubuntu-latest
    services:
      # Azure App Configuration emulator (HTTP :8080, HMAC over plain HTTP),
      # offline. A fork of tnc1997/azure-app-configuration-emulator patched to
      # interoperate with the official Azure SDKs.
      # https://github.com/mpyw/azure-app-configuration-emulator
      azure-appconfig:
        image: ghcr.io/mpyw/azure-app-configuration-emulator:latest
        ports:
          - 8080:8080
        env:
          ASPNETCORE_HTTP_PORTS: 8080
      # Azure Key Vault emulator (lowkey-vault, HTTPS :8443, self-signed cert,
      # auth present-but-ignored), offline.
      azure-keyvault:
        image: nagyesta/lowkey-vault:7.3.0
        ports:
          - 8443:8443
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the App Configuration emulator
        run: timeout 60 bash -c 'until (echo > /dev/tcp/localhost/8080) 2>/dev/null; do sleep 1; done'

      - name: Wait for the Key Vault emulator
        run: timeout 60 bash -c 'until curl -sk -o /dev/null https://localhost:8443/ping; do sleep 1; done'

      - name: Run Azure TUI e2e tests with coverage
        run: |
          COVERPKG=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
          go test -v -race -tags e2e -run '^TestTUIAzure' -coverprofile=coverage-e2e-azure-tui.txt -covermode=atomic -coverpkg=$COVERPKG ./e2e/...
        env:
          SUVE_AZURE_APPCONFIG_CONNECTION_STRING: "Endpoint=http://localhost:8080;Id=abcd;Secret=c2VjcmV0"
          SUVE_AZURE_KEYVAULT_ENDPOINT: "https://localhost:8443"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-e2e-azure-tui.txt
          flags: e2e
          name: codecov-suve-e2e-azure-tui
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go golangci-lint go:golang.org/x/tools/cmd/deadcode"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run golangci-lint (default build)
        run: golangci-lint run --timeout=5m

      - name: Run deadcode
        run: mise run deadcode

      - name: Create dummy frontend dist for production lint
        run: mkdir -p internal/gui/frontend/dist && touch internal/gui/frontend/dist/index.html

      - name: Install Wails dependencies (CGO)
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep $((i * 5)); done
          for i in {1..5}; do sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config && break || sleep $((i * 5)); done

      - name: Run golangci-lint (production build)
        run: golangci-lint run --timeout=5m --build-tags=production,webkit2_41

      - name: Run goroutinectx
        run: go run github.com/mpyw/goroutinectx/cmd/goroutinectx@v0.7.5 ./...

  naming:
    name: Naming Convention
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Google Cloud naming (no bare acronym)
        run: bash .github/scripts/check-naming.sh

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: internal/gui/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "node"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run Biome and svelte-check
        run: npm run ci

  gui-test:
    name: GUI Test (Playwright)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: internal/gui/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "node"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # V8 coverage is identical across OSes, so collect + upload it once on
      # ubuntu (COVERAGE=1 turns on the monocart pipeline; see
      # tests/fixtures/coverage.ts). Other OSes run the plain suite.
      - name: Run Playwright tests (with coverage)
        if: matrix.os == 'ubuntu-latest'
        run: COVERAGE=1 npm test

      - name: Run Playwright tests
        if: matrix.os != 'ubuntu-latest'
        run: npm test

      - name: Upload frontend coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./internal/gui/frontend/coverage/lcov.info
          flags: gui-frontend
          name: codecov-suve-gui-frontend
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.os }}
          path: internal/gui/frontend/playwright-report/
          retention-days: 30

  linux-cli-package:
    name: Linux CLI Package Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go nfpm"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CLI binary
        run: |
          CGO_ENABLED=0 go build -o suve-cli ./cmd/suve
          file suve-cli

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: suve-cli-linux-amd64
          path: suve-cli
          retention-days: 7

      - name: Verify binary runs correctly
        run: |
          ./suve-cli --help
          ./suve-cli --version

      - name: Install lintian and rpmlint
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep $((i * 5)); done
          for i in {1..5}; do sudo apt-get install -y lintian rpm rpmlint && break || sleep $((i * 5)); done

      - name: Generate CLI packages
        env:
          VERSION: "0.0.0-test"
          GOARCH: amd64
        run: |
          nfpm pkg --config .github/templates/nfpm.yaml --packager deb --target "suve-cli_test_amd64.deb"
          nfpm pkg --config .github/templates/nfpm.yaml --packager rpm --target "suve-cli-test.x86_64.rpm"
          ls -la *.deb *.rpm

      - name: Lint CLI packages
        run: |
          lintian --tag-display-limit 0 \
            --suppress-tags no-changelog,no-manual-page,unknown-field,hardening-no-pie,hardening-no-relro,unstripped-binary-or-object,undeclared-elf-prerequisites,extended-description-contains-empty-paragraph,statically-linked-binary \
            "suve-cli_test_amd64.deb"

      - name: Test .deb installation
        run: |
          sudo dpkg -i "suve-cli_test_amd64.deb"
          command -v suve
          suve --version
          suve --help
          sudo dpkg -r suve-cli

      - name: Test .rpm installation (Fedora container)
        run: |
          docker run --rm -v "$PWD:/work" -w /work fedora:latest bash -c '
            set -e
            dnf install -y "./suve-cli-test.x86_64.rpm"
            command -v suve
            suve --version
            suve --help
          '

  linux-gui-package:
    name: Linux GUI Package Test (${{ matrix.arch }}, webkit2gtk-${{ matrix.webkit }})
    runs-on: ubuntu-${{ matrix.ubuntu }}${{ matrix.arch == 'arm64' && '-arm' || '' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        webkit: ["4.0", "4.1"]
        include:
          - arch: amd64
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
          - webkit: "4.0"
            ubuntu: "22.04"
            fedora: "39"
            webkit_deb: libwebkit2gtk-4.0-37
            webkit_rpm: webkit2gtk4.0
            pkg_suffix: ""
          - webkit: "4.1"
            ubuntu: "24.04"
            fedora: "latest"
            webkit_deb: libwebkit2gtk-4.1-0
            webkit_rpm: webkit2gtk4.1
            pkg_suffix: "_webkit2_41"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # This job's webkit-4.0 matrix leg runs on Ubuntu 22.04 (the only runner
      # that still ships libwebkit2gtk-4.0-dev), whose glibc 2.35 is too old for
      # mise's prebuilt binary. Use the standard setup actions here; the tool
      # versions are kept in sync with mise.toml.
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: internal/gui/frontend/package-lock.json

      - name: Install build dependencies
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep $((i * 5)); done
          for i in {1..5}; do sudo apt-get install -y libgtk-3-dev libwebkit2gtk-${{ matrix.webkit }}-dev && break || sleep $((i * 5)); done

      - name: Build frontend
        run: |
          cd internal/gui/frontend
          npm ci
          npm run build

      - name: Build GUI binary
        run: |
          TAGS="production"
          if [[ "${{ matrix.webkit }}" == "4.1" ]]; then
            TAGS="production,webkit2_41"
          fi
          CGO_ENABLED=1 go build -tags "$TAGS" -o suve ./cmd/suve
          file suve

      - name: Verify binary runs correctly
        run: |
          ./suve --help | grep -q '\-\-gui' && echo "GUI flag found" || { echo "ERROR: --gui flag missing!"; exit 1; }
          ./suve --version

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.1

      - name: Install lintian and rpmlint
        run: for i in {1..5}; do sudo apt-get install -y lintian rpm rpmlint && break || sleep $((i * 5)); done

      - name: Generate GUI packages
        env:
          VERSION: "0.0.0-test"
          GOARCH: ${{ matrix.arch }}
          GTK_DEB: "libgtk-3-0"
          GTK_RPM: "gtk3"
          WEBKIT_DEB: ${{ matrix.webkit_deb }}
          WEBKIT_RPM: ${{ matrix.webkit_rpm }}
        run: |
          nfpm pkg --config .github/templates/nfpm-gui.yaml --packager deb --target "suve${{ matrix.pkg_suffix }}_test_${{ matrix.deb_arch }}.deb"
          nfpm pkg --config .github/templates/nfpm-gui.yaml --packager rpm --target "suve${{ matrix.pkg_suffix }}-test.${{ matrix.rpm_arch }}.rpm"
          ls -la *.deb *.rpm

      - name: Lint GUI packages
        run: |
          echo "=== lintian check (.deb) ==="
          lintian --tag-display-limit 0 \
            --suppress-tags no-changelog,no-manual-page,unknown-field,hardening-no-pie,hardening-no-relro,unstripped-binary-or-object,undeclared-elf-prerequisites,extended-description-contains-empty-paragraph \
            "suve${{ matrix.pkg_suffix }}_test_${{ matrix.deb_arch }}.deb"

          echo "=== rpmlint check (.rpm) ==="
          rpmlint "suve${{ matrix.pkg_suffix }}-test.${{ matrix.rpm_arch }}.rpm" || true

      - name: Test .deb installation
        run: |
          for i in {1..5}; do sudo apt-get update && break || sleep $((i * 5)); done
          for i in {1..5}; do sudo apt-get install -y libgtk-3-0 ${{ matrix.webkit_deb }} && break || sleep $((i * 5)); done
          sudo dpkg -i "suve${{ matrix.pkg_suffix }}_test_${{ matrix.deb_arch }}.deb"
          command -v suve
          suve --version
          suve --help
          sudo dpkg -r suve

      - name: Test .rpm installation (Fedora container)
        run: |
          docker run --rm -v "$PWD:/work" -w /work fedora:${{ matrix.fedora }} bash -c '
            set -e
            dnf install -y "./suve${{ matrix.pkg_suffix }}-test.${{ matrix.rpm_arch }}.rpm"
            command -v suve
            suve --version
            suve --help
          '

  platform-test:
    name: Platform Test (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: darwin
            runner: macos-latest
          - os: windows
            runner: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find platform-specific packages
        id: packages
        shell: bash
        run: |
          # Find packages with platform-specific build tags (excluding gui and test files)
          PACKAGES=$(grep -rl "//go:build" --include="*.go" . \
            | grep -v "_test.go" \
            | grep -v "/gui/" \
            | grep -v "vendor" \
            | xargs -I{} dirname {} \
            | sort -u \
            | sed 's|^\./|./|' \
            | tr '\n' ' ')
          echo "packages=$PACKAGES"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Run platform-specific tests with coverage
        shell: bash
        run: |
          COVERPKG=""
          for pkg in ${{ steps.packages.outputs.packages }}; do
            if [ -n "$COVERPKG" ]; then
              COVERPKG="$COVERPKG,"
            fi
            COVERPKG="$COVERPKG$pkg/..."
          done
          echo "Coverage packages: $COVERPKG"
          go test -v -race -coverprofile=coverage-platform-${{ matrix.os }}.txt -covermode=atomic -coverpkg="$COVERPKG" ${{ steps.packages.outputs.packages }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage-platform-${{ matrix.os }}.txt
          flags: platform-${{ matrix.os }}
          name: codecov-suve-platform-${{ matrix.os }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  platform-lint:
    name: Platform Lint (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: darwin
            runner: macos-latest
          # Note: Windows excluded due to gci formatter false positives.
          # Main Lint job (Linux) covers all essential checks.
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go golangci-lint"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  platform-build:
    name: Platform Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
          - goos: openbsd
            goarch: amd64
          - goos: netbsd
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: "go"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find platform-specific packages
        id: packages
        run: |
          # Find packages with platform-specific build tags (excluding gui and test files)
          PACKAGES=$(grep -rl "//go:build" --include="*.go" . \
            | grep -v "_test.go" \
            | grep -v "/gui/" \
            | grep -v "vendor" \
            | xargs -I{} dirname {} \
            | sort -u \
            | sed 's|^\./|./|' \
            | tr '\n' ' ')
          echo "packages=$PACKAGES"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"

      - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          echo "Building for $GOOS/$GOARCH..."
          for pkg in ${{ steps.packages.outputs.packages }}; do
            echo "Building $pkg..."
            go build -v "$pkg/..."
          done
          echo "Build successful for $GOOS/$GOARCH"

  npm-package:
    name: npm Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.0.0
        with:
          node-version: "22"

      - name: Test the bin shim and platform-package name sync
        working-directory: .github/npm/suve
        run: node --test
