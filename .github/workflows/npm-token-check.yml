name: npm Token Check

# Standalone, on-demand check that the NPM_TOKEN secret authenticates against the
# npm registry. It NEVER publishes anything — it only runs `npm whoami`. Intended
# workflow: add the NPM_TOKEN secret, run this once to confirm it works, then
# delete the secret again.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Verify NPM_TOKEN authenticates
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.0.0
        with:
          node-version: "22"

      - name: npm whoami (no publish)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NPM_TOKEN" ]]; then
            echo "::error::NPM_TOKEN secret is not set. Add it, then re-run."
            exit 1
          fi

          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

          echo "Verifying token against https://registry.npmjs.org ..."
          # Fails the step (non-zero) if the token is invalid/expired.
          who="$(npm whoami --registry=https://registry.npmjs.org)"
          echo "::notice::NPM_TOKEN OK — authenticated as '${who}'."
          echo "Authenticated as: ${who}"

          # Best-effort: show which packages this token can publish to. Not all
          # token types support this; failure here is not treated as fatal.
          echo "Publish access (best-effort):"
          npm access list packages 2>/dev/null | head -30 \
            || echo "(npm access list unavailable for this token; whoami above is the auth proof)"
