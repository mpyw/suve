# Development toolchain for suve — the single source of truth for tool versions.
#
# Consumed both locally (`mise install`) and in CI (jdx/mise-action reads this
# file). Keep the versions here in sync with what the project actually targets:
#   - `go` matches the directive in go.mod / gui/go.mod (Go 1.25).
#   - `golangci-lint` matches the version pinned by the lint jobs.
#   - the wails CLI is pinned to the same release as the wailsapp/wails/v2
#     library in gui/go.mod, so the bindings it regenerates (via `wails dev` in
#     the generate-gui-bindings task) match the library.
[tools]
# Pinned to the exact go.mod directive so CI's carve-out jobs (which read the
# version from go.mod via setup-go) and the mise jobs compile with the same
# Go patch release.
go = "1.25.11"
node = "24"
golangci-lint = "2.12.2"
goreleaser = "2"
nfpm = "2.41.1"
"go:github.com/wailsapp/wails/v2/cmd/wails" = "2.13.0"
# Reports production dead code; run via the `deadcode` task (deadcode lint gate).
"go:golang.org/x/tools/cmd/deadcode" = "0.48.0"

# =============================================================================
# Tasks (run with `mise run <task>`, or `mise <task>` — no name collides with a
# mise subcommand). List them with `mise tasks`.
#
# GUI tasks call wails / npm / go directly: mise puts the pinned versions on
# PATH for the task, so builds and bindings are reproducible regardless of the
# ambient shell.
# =============================================================================

[tasks.build-cli]
description = "Build the CLI binary"
run = "go build -o bin/suve ./cmd/suve"

[tasks.deadcode]
description = "Report production dead code (x/tools deadcode; test-only helpers waived in .github/deadcode-allow.txt)"
run = "bash .github/scripts/check-deadcode.sh"

[tasks.build-gui]
description = "Build the single CLI+GUI binary (bin/suve), embedding a freshly-built frontend"
# A bare `go build -tags production ./cmd/suve` embeds internal/gui/frontend/dist
# as-is, so without this frontend build the binary aborts at `suve --gui` with
# 'no index.html could be found'. Linux/webkit2gtk-4.1 needs webkit2_41 — override
# with SUVE_GUI_TAGS=production,webkit2_41.
run = '''
echo "Building the GUI frontend (embedded into the binary)…"
(cd internal/gui/frontend && npm install && npm run build)
tags="${SUVE_GUI_TAGS:-production}"
echo "Building bin/suve (tags: $tags)…"
CGO_ENABLED=1 go build -tags "$tags" -o bin/suve ./cmd/suve
echo "Built bin/suve — run 'suve --gui'."
'''

[tasks.generate-gui-bindings]
description = "Regenerate the GUI wailsjs bindings"
run = '''
echo "Temporarily removing build constraints..."
find gui internal/gui -name '*.go' -exec sed -i.bak 's|^//go:build.*||' {} \;
echo "Generating bindings..."
(cd gui && timeout 30 wails dev -tags dev 2>&1 | head -30) || true
echo "Restoring build constraints..."
find gui internal/gui -name '*.go.bak' -exec sh -c 'mv "$1" "${1%.bak}"' _ {} \;
echo "Done. Check internal/gui/frontend/wailsjs/go/ for updated bindings."
'''

[tasks.test]
description = "Run unit tests (excludes GUI + cmd)"
# SUVE_STAGING_KEY pins a deterministic working-store data key (base64 of 32
# zero bytes) so local runs never block on the macOS keychain. CI sets no key
# and falls back to plaintext, which is fine — this only affects local runs.
run = "SUVE_STAGING_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA= go test $(go list ./... | grep -v internal/gui | grep -v /cmd/)"

[tasks.lint]
description = "Run golangci-lint on the host OS with all build tags"
# GOHOSTOS is the build host's OS regardless of any ambient GOOS, so lint runs
# against the host platform's build tags.
run = "GOOS=$(go env GOHOSTOS) golangci-lint run --build-tags=e2e,production ./..."

# -----------------------------------------------------------------------------
# E2E tasks: fully closed, Docker-internal runs (compose.test.yaml).
#
# Each invocation gets a UNIQUE compose project (suve-test-$$) so concurrent /
# repeated runs are isolated and never collide, and ALWAYS tears down on exit
# (trap) even on failure. Nothing is published to the host: the Go test suite
# runs inside the `test-runner` container and reaches the emulator(s) by service
# name over the closed compose network. The Go module + build caches live in
# external volumes (created idempotently below) so they survive `down -v` and
# stay shared across runs. The keychain is bypassed via SUVE_STAGING_KEY, set on
# the runner service in compose.test.yaml.
# -----------------------------------------------------------------------------

[tasks.e2e-aws]
alias = "e2e"
description = "Run AWS E2E tests against localstack, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile aws up -d localstack
$compose run --rm --no-deps -e SUVE_LOCALSTACK_ENDPOINT=http://localstack:4566 test-runner bash -c '
  n=0; until curl -sf "$SUVE_LOCALSTACK_ENDPOINT/_localstack/health" >/dev/null 2>&1; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "localstack not ready after 120s" >&2; exit 1; }; sleep 1; done
  go test -tags=e2e -v ./e2e/...
'
'''

# TUI e2e: drives the real TUI App (teatest) against localstack over the same
# closed compose network as e2e-aws. Split into its own task/CI job (the TUI
# tests use the TestTUIAWS prefix so the plain e2e-aws CI filter `^TestAWS`
# skips them) so the interactive-model path has a dedicated, coverage-uploading
# lane. `mise e2e-aws` (no -run filter) still runs these too.
[tasks.e2e-aws-tui]
description = "Run TUI E2E tests (teatest) against localstack, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile aws up -d localstack
$compose run --rm --no-deps -e SUVE_LOCALSTACK_ENDPOINT=http://localstack:4566 test-runner bash -c '
  n=0; until curl -sf "$SUVE_LOCALSTACK_ENDPOINT/_localstack/health" >/dev/null 2>&1; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "localstack not ready after 120s" >&2; exit 1; }; sleep 1; done
  go test -tags=e2e -v -run "^TestTUIAWS" ./e2e/...
'
'''

[tasks.e2e-gcloud]
description = "Run Google Cloud Secret Manager E2E tests, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile gcloud up -d gcloud-secretmanager
$compose run --rm --no-deps -e SUVE_GCLOUD_SECRETMANAGER_ENDPOINT=gcloud-secretmanager:9090 test-runner bash -c '
  n=0; until (echo > /dev/tcp/gcloud-secretmanager/9090) 2>/dev/null; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "gcloud-secretmanager not ready after 120s" >&2; exit 1; }; sleep 1; done
  go test -tags=e2e -v -run TestGoogleCloud ./e2e/...
'
'''

[tasks.e2e-azure-appconfig]
description = "Run Azure App Configuration E2E tests, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile azure up -d azure-appconfig
$compose run --rm --no-deps -e "SUVE_AZURE_APPCONFIG_CONNECTION_STRING=Endpoint=http://azure-appconfig:8080;Id=abcd;Secret=c2VjcmV0" test-runner bash -c '
  n=0; until (echo > /dev/tcp/azure-appconfig/8080) 2>/dev/null; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "azure-appconfig not ready after 120s" >&2; exit 1; }; sleep 1; done
  go test -tags=e2e -v -run "TestAzureAppConfig|TestAzureStageGlobal" ./e2e/...
'
'''

[tasks.e2e-azure-keyvault]
description = "Run Azure Key Vault E2E tests, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile azure up -d azure-keyvault
$compose run --rm --no-deps -e SUVE_AZURE_KEYVAULT_ENDPOINT=https://azure-keyvault:8443 test-runner bash -c '
  n=0; until curl -sk -o /dev/null "$SUVE_AZURE_KEYVAULT_ENDPOINT/ping" 2>/dev/null; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "azure-keyvault not ready after 120s" >&2; exit 1; }; sleep 1; done
  go test -tags=e2e -v -run "TestAzureKeyVault|TestAzureStageGlobal" ./e2e/...
'
'''

[tasks.clean]
description = "Remove build artifacts and stop containers (incl. local-verification + test volumes)"
shell = "bash -c"
run = '''
rm -rf bin/ *.out coverage/
# Default compose project: the local dev-verification emulators (started by
# `mise run bash --aws/--gcloud/--azure`) and the ubuntu-* GUI desktops all sit
# behind profiles, so --profile "*" is required to actually stop them and drop
# their named volumes (go-cache / go-build-cache) — a bare `down -v` would leave
# the profiled emulator containers and their volumes orphaned.
docker compose --profile "*" down -v 2>/dev/null || true
# Sweep any leftover closed-test projects (suve-test-*) from crashed runs, plus
# their shared external caches. --profile "*" so profiled emulator services
# (localstack/gcloud/azure) are actually removed, not just non-profiled ones.
for p in $(docker compose ls -aq 2>/dev/null | grep '^suve-test-' || true); do
  docker compose -f compose.test.yaml -p "$p" --profile "*" down -v 2>/dev/null || true
done
docker compose -f compose.test.yaml --profile "*" down -v 2>/dev/null || true
docker volume rm suve-test-go-cache suve-test-go-build-cache 2>/dev/null || true
'''

# -----------------------------------------------------------------------------
# Seeding: populate the local dev-verification emulators (started by
# `mise run bash --aws/--gcloud/--azure`) with comprehensive demo data — stacked
# versions, tags, and a full spread of staged changes — so every CLI/GUI view has
# something to show. Run these INSIDE a `mise run bash …` shell so the emulator
# env is injected; a service whose env is absent is skipped with a hint.
#
# Leaf tasks do the work; the seed-{aws,gcloud,azure} and seed-all aliases just
# fan out via depends. All share seed-build so the throwaway CLI binary
# (bin/suve-seed, kept apart from a GUI-enabled bin/suve) is compiled once.
# -----------------------------------------------------------------------------

[tasks.seed-build]
hide = true
description = "Compile the throwaway CLI binary used by the seed tasks"
run = "go build -o bin/suve-seed ./cmd/suve"

[tasks.seed-aws-param]
description = "Seed AWS Parameter Store (versions, tags, staged add/edit/delete/tag changes)"
depends = ["seed-build"]
run = "bash scripts/seed.sh aws-param"

[tasks.seed-aws-secret]
description = "Seed AWS Secrets Manager (versions, tags, staged add/edit/delete/tag changes)"
depends = ["seed-build"]
run = "bash scripts/seed.sh aws-secret"

[tasks.seed-aws]
description = "Seed AWS Parameter Store + Secrets Manager"
depends = ["seed-aws-param", "seed-aws-secret"]

[tasks.seed-gcloud-secret]
description = "Seed Google Cloud Secret Manager (versions, labels, staged add/edit/delete/tag changes)"
depends = ["seed-build"]
run = "bash scripts/seed.sh gcloud-secret"

[tasks.seed-gcloud]
description = "Seed Google Cloud (Secret Manager)"
depends = ["seed-gcloud-secret"]

[tasks.seed-azure-secret]
description = "Seed Azure Key Vault (versions with per-version tags, staged add/edit/delete/tag changes)"
depends = ["seed-build"]
run = "bash scripts/seed.sh azure-secret"

[tasks.seed-azure-param]
description = "Seed Azure App Configuration ((NULL)/dev/prd labels, per-label tags, staged add/edit/delete/tag changes)"
depends = ["seed-build"]
run = "bash scripts/seed.sh azure-param"

[tasks.seed-azure]
description = "Seed Azure Key Vault + App Configuration"
depends = ["seed-azure-secret", "seed-azure-param"]

[tasks.seed-all]
description = "Seed every configured cloud (AWS + Google Cloud + Azure)"
depends = ["seed-aws", "seed-gcloud", "seed-azure"]

[tasks.coverage]
description = "Run unit tests with coverage"
# Host-based (no emulator). SUVE_STAGING_KEY bypasses the macOS keychain, matching `test`.
run = '''
export SUVE_STAGING_KEY=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
coverpkg=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr '\n' ',')
go test -coverprofile=coverage.out -coverpkg="$coverpkg" $(go list ./... | grep -v internal/gui | grep -v /cmd/)
go tool cover -func=coverage.out | grep total
'''

# coverage-e2e-aws / coverage-all use the AWS emulator, so they run in the same
# closed Docker model as the e2e tasks (unique per-run project, guaranteed
# teardown, no host ports, keychain bypass via the runner). The runner's /app
# source mount is read-only, so coverage profiles are written to a dedicated
# writable bind mount (host ./coverage -> container /out).
[tasks.coverage-e2e-aws]
alias = "coverage-e2e"
description = "Run AWS E2E tests with coverage, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
mkdir -p coverage
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile aws up -d localstack
$compose run --rm --no-deps \
  -e SUVE_LOCALSTACK_ENDPOINT=http://localstack:4566 \
  -v "$PWD/coverage:/out" \
  test-runner bash -c '
  n=0; until curl -sf "$SUVE_LOCALSTACK_ENDPOINT/_localstack/health" >/dev/null 2>&1; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "localstack not ready after 120s" >&2; exit 1; }; sleep 1; done
  coverpkg=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr "\n" ",")
  go test -tags=e2e -coverprofile=/out/coverage-e2e.out -coverpkg="$coverpkg" ./e2e/...
  go tool cover -func=/out/coverage-e2e.out | grep total
'
'''

[tasks.coverage-all]
description = "Run unit + E2E tests and report merged coverage, fully inside Docker (no host ports)"
shell = "bash -c"
run = '''
set -euo pipefail
project="suve-test-$$"
compose="docker compose -f compose.test.yaml -p $project"
cleanup() { $compose --profile "*" down -v >/dev/null 2>&1 || true; }
trap cleanup EXIT INT TERM
mkdir -p coverage
docker volume create suve-test-go-cache >/dev/null
docker volume create suve-test-go-build-cache >/dev/null
$compose --profile aws up -d localstack
$compose run --rm --no-deps \
  -e SUVE_LOCALSTACK_ENDPOINT=http://localstack:4566 \
  -v "$PWD/coverage:/out" \
  test-runner bash -c '
  n=0; until curl -sf "$SUVE_LOCALSTACK_ENDPOINT/_localstack/health" >/dev/null 2>&1; do n=$((n+1)); [ "$n" -ge 120 ] && { echo "localstack not ready after 120s" >&2; exit 1; }; sleep 1; done
  coverpkg=$(go list ./... | grep -v testutil | grep -v /e2e | grep -v internal/gui | grep -v /cmd/ | tr "\n" ",")
  echo "Running unit tests with coverage..."
  go test -coverprofile=/out/coverage-unit.out -covermode=atomic -coverpkg="$coverpkg" $(go list ./... | grep -v internal/gui | grep -v /cmd/)
  echo "Running E2E tests with coverage..."
  go test -tags=e2e -coverprofile=/out/coverage-e2e.out -covermode=atomic -coverpkg="$coverpkg" ./e2e/...
  echo "Merging coverage profiles..."
  go run github.com/wadey/gocovmerge@latest /out/coverage-unit.out /out/coverage-e2e.out > /out/coverage-all.out
  go tool cover -func=/out/coverage-all.out | grep total
'
'''

# Linux GUI test environment (requires XQuartz on macOS).
[tasks.x11-setup]
description = "Allow local X11 connections for the Linux GUI containers"
run = "xhost +localhost 2>/dev/null || true"

[tasks.ubuntu-22]
description = "Start the Ubuntu 22.04 desktop (webkit2gtk-4.0, requires XQuartz)"
depends = ["x11-setup"]
run = "HOST_DISPLAY=host.docker.internal:0 docker compose --profile ubuntu-22 run --rm ubuntu-22"

[tasks.ubuntu-24]
description = "Start the Ubuntu 24.04 desktop (webkit2gtk-4.1, requires XQuartz)"
depends = ["x11-setup"]
run = "HOST_DISPLAY=host.docker.internal:0 docker compose --profile ubuntu-24 run --rm ubuntu-24"
