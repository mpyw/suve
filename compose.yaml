services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "127.0.0.1:${SUVE_LOCALSTACK_EXTERNAL_PORT:-4566}:4566/tcp"
    environment:
      - SERVICES=ssm,secretsmanager,events
      - DEBUG=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  gcp-secretmanager:
    # Google Cloud Secret Manager emulator (gRPC :9090, REST :8080), no auth,
    # runs entirely offline. Used by the `e2e-gcp` target / CI job; the provider
    # adapter targets it via SUVE_GCP_SECRETMANAGER_ENDPOINT.
    profiles:
      - gcp
    image: ghcr.io/blackwell-systems/gcp-secret-manager-emulator-dual:latest
    ports:
      - "127.0.0.1:${SUVE_GCP_EMULATOR_PORT:-9090}:9090/tcp"

  azure-appconfig:
    # Official Microsoft Azure App Configuration emulator (HTTP :8483), run with
    # anonymous auth so no credentials are needed. Used by the `e2e-azure`
    # target / CI job; the provider adapter targets it via
    # AZURE_APPCONFIG_CONNECTION_STRING (dummy HMAC creds, ignored by anon auth).
    profiles:
      - azure
    image: mcr.microsoft.com/azure-app-configuration/app-configuration-emulator:1.0.2
    ports:
      - "127.0.0.1:${SUVE_AZURE_APPCONFIG_PORT:-8483}:8483/tcp"
    environment:
      - Tenant__AnonymousAuthEnabled=true
      - Authentication__Anonymous__AnonymousUserRole=Owner

  ubuntu-22:
    profiles:
      - ubuntu-22
    build:
      context: .
      dockerfile: docker/ubuntu-22/Dockerfile
    environment:
      - DISPLAY=${HOST_DISPLAY:-host.docker.internal:0}
    volumes:
      - .:/app
      - go-cache:/root/go
      - go-build-cache:/root/.cache/go-build
    working_dir: /app
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ubuntu-24:
    profiles:
      - ubuntu-24
    build:
      context: .
      dockerfile: docker/ubuntu-24/Dockerfile
    environment:
      - DISPLAY=${HOST_DISPLAY:-host.docker.internal:0}
    volumes:
      - .:/app
      - go-cache:/root/go
      - go-build-cache:/root/.cache/go-build
    working_dir: /app
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  go-cache:
  go-build-cache:
